<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Typing Speed Test - WebTools</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <a href="../index.html" class="back-btn">← Back to Home</a>

    <div class="container">
        <h1>Typing Speed Test</h1>
        <div class="stats">
            <div class="stat-box">Time: <b id="timer">60</b>s</div>
            <div class="stat-box">WPM: <b id="wpm">0</b></div>
            <div class="stat-box">Accuracy: <b id="accuracy">100</b>%</div>
        </div>

        <div id="text-display" class="text-display">
            </div>

        <textarea id="input-field" placeholder="Start typing here..."></textarea>

        <button id="retryBtn">Restart Test</button>
    </div>

    <script src="script.js"></script>
</body>
</html>
